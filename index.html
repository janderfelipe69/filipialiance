<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F I L I P I • PokeAlliance Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #04060e;
  --surface: #080f1e;
  --surface2: #0d1628;
  --surface3: #111e35;
  --border: rgba(56,140,255,0.18);
  --border-hover: rgba(56,140,255,0.5);
  --text: #dde8ff;
  --muted: #5a7099;
  --blue: #3a8cff;
  --blue-bright: #60aaff;
  --gold: #f0b429;
  --gold-dim: rgba(240,180,41,0.15);
  --gold-bright: #ffd166;
  --glow-blue: rgba(58,140,255,0.4);
  --glow-gold: rgba(240,180,41,0.35);
  --radius: 12px;
  --font-title: 'Cinzel', serif;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Space Mono', monospace;
}

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

/* ===================== BODY ===================== */
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===================== ANIMATED BACKGROUND ===================== */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-canvas::before {
  content: '';
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(58,140,255,0.07) 0%, transparent 70%);
  top: -200px; left: -200px;
  animation: floatOrb1 18s ease-in-out infinite;
}

.bg-canvas::after {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(240,180,41,0.05) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: floatOrb2 22s ease-in-out infinite;
}

@keyframes floatOrb1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(80px, 60px) scale(1.1); }
  66% { transform: translate(-40px, 100px) scale(0.9); }
}

@keyframes floatOrb2 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-60px, -80px) scale(1.15); }
}

.stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 50%, rgba(58,140,255,0.8) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 30%, rgba(240,180,41,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
  animation: twinkle 8s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* ===================== HEADER ===================== */
header {
  position: relative;
  z-index: 10;
  background: linear-gradient(180deg, rgba(8,15,30,0.98) 0%, rgba(8,15,30,0.92) 100%);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--blue) 20%,
    var(--gold) 50%,
    var(--blue) 80%,
    transparent 100%);
  animation: scanLine 4s ease-in-out infinite;
}

@keyframes scanLine {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.header-grid {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 18px 32px;
  max-width: 1600px;
  margin: 0 auto;
}

/* PA LOGO EMBLEM */
.pa-emblem {
  position: relative;
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}

.pa-emblem svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 12px var(--glow-blue)) drop-shadow(0 0 24px rgba(58,140,255,0.2));
  animation: emblemFloat 4s ease-in-out infinite;
}

@keyframes emblemFloat {
  0%,100% { transform: translateY(0); filter: drop-shadow(0 0 12px var(--glow-blue)); }
  50% { transform: translateY(-3px); filter: drop-shadow(0 0 20px var(--glow-blue)) drop-shadow(0 0 8px var(--glow-gold)); }
}

/* SELLER INFO */
.seller-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.seller-name {
  font-family: var(--font-title);
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #fff 0%, var(--blue-bright) 40%, var(--gold) 70%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% auto;
  animation: shimmer 4s linear infinite;
  text-shadow: none;
  line-height: 1;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.seller-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.seller-title {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.server-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--gold-dim);
  border: 1px solid rgba(240,180,41,0.35);
  border-radius: 20px;
  padding: 2px 10px 2px 6px;
  font-family: var(--font-title);
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.server-tag::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(240,180,41,0.1), transparent);
  transform: translateX(-100%);
  animation: tagShine 3s ease-in-out infinite;
}

@keyframes tagShine {
  0%,100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}

.moon-icon {
  font-size: 12px;
  animation: moonPulse 2s ease-in-out infinite;
}

@keyframes moonPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.divider-v {
  width: 1px;
  height: 14px;
  background: var(--border);
}

.item-count-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* CART BUTTON */
.cart-trigger {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--blue) 0%, #1a6fe8 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 12px 22px;
  font-family: var(--font-title);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
  text-transform: uppercase;
  box-shadow: 0 4px 20px var(--glow-blue), inset 0 1px 0 rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}

.cart-trigger::before {
  content: '';
  position: absolute;
  top: -50%; left: -60%;
  width: 40%; height: 200%;
  background: rgba(255,255,255,0.15);
  transform: skewX(-20deg);
  transition: left 0.4s;
}

.cart-trigger:hover::before { left: 120%; }
.cart-trigger:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--glow-blue); }

.cart-count {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 20px;
  padding: 1px 8px;
  font-size: 11px;
  font-family: var(--font-mono);
  min-width: 24px;
  text-align: center;
}

/* ===================== CONTROLS ===================== */
.controls {
  position: sticky;
  top: 0;
  z-index: 9;
  background: rgba(4,6,14,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.35;
  pointer-events: none;
}

input[type=text] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 14px 10px 40px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input[type=text]:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(58,140,255,0.1);
}
input[type=text]::placeholder { color: var(--muted); }

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 14px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
select:focus { border-color: var(--blue); }

.count-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

/* ===================== GRID ===================== */
.grid-wrap {
  padding: 24px 32px 120px;
  position: relative;
  z-index: 1;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

/* ===================== CARD ===================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.2s;
  animation: cardIn 0.3s ease both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(58,140,255,0.05) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}

.card:hover {
  border-color: rgba(58,140,255,0.4);
  background: var(--surface2);
  box-shadow: 0 0 0 1px rgba(58,140,255,0.1), 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(58,140,255,0.08);
  transform: translateY(-3px);
}

.card:hover::before, .card:hover::after { opacity: 1; }

.card.is-shiny { border-color: rgba(240,180,41,0.25); }
.card.is-shiny::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.card.is-shiny::after { background: radial-gradient(circle at 50% 0%, rgba(240,180,41,0.06) 0%, transparent 60%); }
.card.is-shiny:hover { border-color: rgba(240,180,41,0.5); box-shadow: 0 0 0 1px rgba(240,180,41,0.1), 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(240,180,41,0.1); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.item-name {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-transform: capitalize;
  line-height: 1.3;
  letter-spacing: 0.2px;
}

/* ===================== PRICE BLOCK ===================== */
.price-block {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 8px;
  background: rgba(0,0,0,0.25);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.04);
  margin-top: 2px;
}

.price-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.price-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  min-width: 34px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.price-kk {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--blue-bright);
}

.price-brl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

.price-none {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,255,255,0.12);
  padding: 4px 0;
}

.price-total-kk {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}

.price-total-brl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(240,180,41,0.5);
}

.price-divider {
  height: 1px;
  background: rgba(255,255,255,0.05);
  margin: 2px 0;
}

/* ===================== CARD FOOTER ===================== */
.card-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}

input[type=number] {
  width: 72px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  text-align: center;
  transition: border-color 0.2s;
}

input[type=number]:focus { border-color: var(--blue); }
input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

.add-btn {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(58,140,255,0.3);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--font-title);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 7px 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.add-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--blue), #1a6fe8);
  opacity: 0;
  transition: opacity 0.2s;
}

.add-btn span { position: relative; z-index: 1; }

.add-btn:hover { border-color: var(--blue); color: #fff; }
.add-btn:hover::before { opacity: 1; }
.add-btn.added { border-color: var(--blue); color: #fff; }
.add-btn.added::before { opacity: 1; }

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 80px 0;
}

/* ===================== CART OVERLAY ===================== */
.cart-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  backdrop-filter: blur(6px);
}

.cart-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }

.cart-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  width: 100%;
  max-width: 440px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  animation: slideIn 0.3s cubic-bezier(.22,.68,0,1.2);
  position: relative;
  overflow: hidden;
}

.cart-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--gold), var(--blue));
  background-size: 200%;
  animation: cartTop 3s linear infinite;
}

@keyframes cartTop {
  0% { background-position: 0%; }
  100% { background-position: 200%; }
}

@keyframes slideIn {
  from { transform: translateX(60px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

.cart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.cart-header h2 {
  font-family: var(--font-title);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--blue-bright), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.close-btn {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  width: 32px; height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.close-btn:hover { color: var(--text); border-color: var(--border-hover); }

.cart-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cart-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  transition: border-color 0.15s;
}
.cart-row:hover { border-color: var(--border-hover); }

.cart-row-name {
  font-size: 13px;
  font-weight: 700;
  text-transform: capitalize;
  color: var(--text);
  font-family: var(--font-body);
}

.cart-row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.cart-qty { font-family: var(--font-mono); font-size: 12px; color: var(--blue-bright); }
.cart-price-block { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.cart-price-kk { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--gold); }
.cart-price-brl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }

.rem-btn {
  background: none; border: none;
  color: var(--muted); font-size: 14px;
  cursor: pointer; padding: 3px 5px;
  border-radius: 4px; transition: color 0.15s;
  line-height: 1;
}
.rem-btn:hover { color: #ff6b6b; }

/* CART FOOTER */
.cart-footer {
  padding: 18px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.cart-total {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}
.cart-total strong { color: var(--text); font-size: 13px; }

.cart-grand-total {
  background: linear-gradient(135deg, rgba(58,140,255,0.08), rgba(240,180,41,0.06));
  border: 1px solid rgba(240,180,41,0.25);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 12px;
}

.cart-grand-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.cart-grand-row:last-child { margin-bottom: 0; }
.cart-grand-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.cart-grand-val { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--blue-bright); }
.cart-grand-val-brl { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--gold); }

.whats-btn {
  width: 100%;
  background: linear-gradient(135deg, #25d366, #128c3e);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-title);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
  text-transform: uppercase;
  box-shadow: 0 4px 15px rgba(37,211,102,0.25);
}
.whats-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,211,102,0.35); }

.clear-btn {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(255,100,100,0.25);
  border-radius: var(--radius);
  color: rgba(255,107,107,0.7);
  font-family: var(--font-title);

const KK_TO_BRL = 1.70;

function formatKK(raw) {
  if (!raw || raw <= 0) return null;
  let label = '';
  if (raw >= 1000000000) {
    const v = raw / 1000000000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'kkk';
  } else if (raw >= 1000000) {
    const v = raw / 1000000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'kk';
  } else if (raw >= 1000) {
    const v = raw / 1000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'k';
  } else {
    label = raw.toString();
  }
  const brl = (raw / 1000000 * KK_TO_BRL).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  return { label, brl };
}

    return matchQ && matchF;

      : `<div class="item-price"><span class="price-none">sem preço</span></div>`;
    return `<div class="card${tag === 'shiny' ? ' is-shiny' : ''}">
      <div class="item-name">${item.name}</div>
      ${src}
      ${priceHtml}
      <div class="card-footer">
        <input type="number" id="qty-${i}" value="1" min="1" max="100000" oninput="updateTotalPrice(${i}, this.value)" />
        <button class="add-btn${inCart ? ' added' : ''}" id="addbtn-${i}" onclick="addToCart(${i})">
          <span>${inCart ? '✓ Adicionado' : 'Adicionar'}</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

function updateTotalPrice(i, rawVal) {
  const qty = Math.max(1, parseInt(rawVal, 10) || 1);
  const item = items[i];
  if (!item || !item.price) return;
  const totalPrice = item.price * qty;
  const data = formatKK(totalPrice);
  if (!data) return;
  const kkEl = document.getElementById('total-kk-' + i);
  const brlEl = document.getElementById('total-brl-' + i);
  if (kkEl) kkEl.textContent = data.label;
  if (brlEl) brlEl.textContent = data.brl;
}


function sendToWhatsApp() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (!keys.length) return;

  const lines = keys.map(k => {
    const item = items[k];
    const qty = cart[k];
    const priceData = item.price ? formatKK(item.price * qty) : null;
    const priceStr = priceData ? ` — ${priceData.label} (${priceData.brl})` : '';
    return `• ${item.name} x${qty.toLocaleString()}${priceStr}`;
  });

  const grandTotalRaw = keys.reduce((s, k) => {
    const item = items[k];
    return s + (item && item.price ? item.price * cart[k] : 0);
  }, 0);

  let msg = '🛒 *Lista de Itens*\n\n' + lines.join('\n');
  if (grandTotalRaw > 0) {
    const gt = formatKK(grandTotalRaw);
    msg += `\n\n💰 *Total: ${gt.label} (${gt.brl})*`;
  }

  const phone = '5565999911832';
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function addToCart(i) {
  const input = document.getElementById('qty-' + i);
  let val = parseInt(input ? input.value : 1, 10);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 100000) val = 100000;
  cart[i] = (cart[i] || 0) + val;
  updateCartBadge();
  const btn = document.getElementById('addbtn-' + i);
  if (btn) { btn.innerHTML = '<span>✓ Adicionado</span>'; btn.classList.add('added'); }
}

function updateCartBadge() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const total = keys.reduce((s, k) => s + cart[k], 0);
  document.getElementById('cart-count-badge').textContent = total.toLocaleString();
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const footer = document.getElementById('cart-footer');
  const keys = Object.keys(cart).filter(k => cart[k] > 0);

  if (!keys.length) {
    list.innerHTML = `<div class="cart-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span>Carrinho vazio</span>
    </div>`;
    footer.style.display = 'none';
    return;
  }

  const total = keys.reduce((s, k) => s + cart[k], 0);
  const grandTotalRaw = keys.reduce((s, k) => {
    const item = items[k];
    return s + (item && item.price ? item.price * cart[k] : 0);
  }, 0);
  document.getElementById('cart-total-num').textContent = total.toLocaleString();
  footer.style.display = 'block';

  // Update grand total in footer
  const gtKkEl = document.getElementById('cart-grand-kk');
  const gtBrlEl = document.getElementById('cart-grand-brl');
  if (grandTotalRaw > 0) {
    const gtData = formatKK(grandTotalRaw);
    if (gtKkEl) gtKkEl.textContent = gtData.label;
    if (gtBrlEl) gtBrlEl.textContent = gtData.brl;
    document.getElementById('cart-grand-total-block').style.display = 'block';
  } else {
    document.getElementById('cart-grand-total-block').style.display = 'none';
  }

  list.innerHTML = keys.map(k => {
    const item = items[k];
    const src = '';
    const itemTotalRaw = item.price ? item.price * cart[k] : 0;
    const priceBlock = itemTotalRaw > 0
      ? (() => {
          const unitData = formatKK(item.price);
          const totalData = formatKK(itemTotalRaw);
          return `<div class="cart-price-block">
            <span class="cart-price-kk">${totalData.label}</span>
            <span class="cart-price-brl">${totalData.brl}</span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">unit: ${unitData.label}</span>
          </div>`;
        })()
      : '';
    return `<div class="cart-row">
      <div>
        <div class="cart-row-name">${item.name}</div>
        ${src}
      </div>
      <div class="cart-row-right">
        ${priceBlock}
        <span class="cart-qty">×${cart[k].toLocaleString()}</span>
        <button class="rem-btn" onclick="removeFromCart(${k})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function removeFromCart(i) {
  delete cart[i];
  const btn = document.getElementById('addbtn-' + i);
  if (btn) { btn.innerHTML = '<span>Adicionar</span>'; btn.classList.remove('added'); }
  updateCartBadge();
  renderCart();
}

function clearCart() {
  Object.keys(cart).forEach(k => {
    const btn = document.getElementById('addbtn-' + k);
    if (btn) { btn.innerHTML = '<span>Adicionar</span>'; btn.classList.remove('added'); }
    delete cart[k];
  });
  updateCartBadge();
  renderCart();
}

render();
</script>
</body>
</html>
