<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Item Index</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #7a7880;
    --accent: #c8f04a;
    --accent-dim: rgba(200,240,74,0.12);
    --shiny: #f9c846;
    --shiny-dim: rgba(249,200,70,0.12);
    --radius: 10px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
    background: var(--surface);
  }

  .logo {
    flex: 1;
  }

  .logo h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    line-height: 1;
  }

  .logo p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }

  .cart-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .cart-trigger:hover { opacity: 0.85; }

  .cart-count {
    background: #0d0d0f;
    color: var(--accent);
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  /* CONTROLS */
  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
  }

  input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  select:focus { border-color: var(--accent); }

  .count-label {
    display: flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* GRID */
  .grid-wrap {
    padding: 24px 32px 120px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s, background 0.15s;
    animation: fadeIn 0.25s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover { border-color: var(--border-hover); background: var(--surface2); }

  .card.is-shiny { border-color: rgba(249,200,70,0.2); }
  .card.is-shiny:hover { border-color: rgba(249,200,70,0.4); }

  .item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-transform: capitalize;
    line-height: 1.35;
  }

  .item-source {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    line-height: 1.4;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 20px;
    width: fit-content;
  }

  .tag-shiny { background: var(--shiny-dim); color: var(--shiny); }
  .tag-orb { background: rgba(130,100,255,0.15); color: #a98fff; }
  .tag-essence { background: rgba(80,200,160,0.12); color: #5ecba1; }
  .tag-normal { background: rgba(255,255,255,0.06); color: var(--muted); }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  input[type=number] {
    width: 80px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }

  input[type=number]:focus { border-color: var(--accent); }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }

  .add-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border-hover);
    border-radius: 7px;
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .add-btn.added { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .item-price {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }
  .price-kk {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .price-brl {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .price-none {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,0.15);
  }

  .price-block {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 2px;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .price-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    min-width: 38px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .price-total-kk {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--shiny);
  }

  .price-total-brl {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(249,200,70,0.6);
  }

  /* CART PRICE TOTALS */
  .cart-price-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: flex-end;
  }
  .cart-price-kk {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }
  .cart-price-brl {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }
  .cart-grand-total {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .cart-grand-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .cart-grand-row:last-child { margin-bottom: 0; }
  .cart-grand-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cart-grand-val {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .cart-grand-val-brl {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--shiny);
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 60px 0;
  }

  /* CART OVERLAY */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .cart-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }

  .cart-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .cart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .cart-header h2 { font-size: 18px; font-weight: 800; }

  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }

  .close-btn:hover { color: var(--text); }

  .cart-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cart-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px 14px;
  }

  .cart-row-name { font-size: 13px; font-weight: 600; text-transform: capitalize; }
  .cart-row-src { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }

  .cart-row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .cart-qty { font-family: var(--font-mono); font-size: 13px; color: var(--accent); }

  .rem-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .rem-btn:hover { color: #ff6b6b; }

  .cart-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 14px;
  }

  .cart-total strong { color: var(--text); font-size: 15px; }


  .whats-btn {
    width: 100%;
    background: #25d366;
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .whats-btn:hover { background: #1ebe5d; }

  .clear-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,100,100,0.3);
    border-radius: var(--radius);
    color: #ff6b6b;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .clear-btn:hover { background: rgba(255,100,100,0.08); }

  .cart-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    gap: 10px;
  }

  .cart-empty svg { opacity: 0.2; }

  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; }
    .controls { padding: 14px 16px; }
    .grid-wrap { padding: 16px 16px 120px; }
    .cart-panel { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Item Index</h1>
    <p id="total-count">carregando...</p>
  </div>
  <button class="cart-trigger" onclick="openCart()">
    Carrinho <span class="cart-count" id="cart-count-badge">0</span>
  </button>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.5"/>
      <path d="M10 10L13 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar item ou Pokémon..." oninput="render()" />
  </div>
  <select id="filter" onchange="render()">
    <option value="all">Todos</option>
    <option value="shiny">Shiny</option>
    <option value="orb">Orbs</option>
    <option value="essence">Essências</option>
    <option value="normal">Normal</option>

  <span class="count-label" id="count-label">— itens</span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="handleOverlayClick(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>Carrinho</h2>
      <button class="close-btn" onclick="closeCart()">&#x2715;</button>
    </div>
    <div class="cart-list" id="cart-list">
      <div class="cart-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">

        <div class="cart-grand-row">
          <span class="cart-grand-label">Total R$</span>

    </div>
  </div>
</div>

const KK_TO_BRL = 1.70;

function formatKK(raw) {
  if (!raw || raw <= 0) return null;
  let label = '';
  if (raw >= 1000000000) {
    const v = raw / 1000000000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'kkk';
  } else if (raw >= 1000000) {
    const v = raw / 1000000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'kk';
  } else if (raw >= 1000) {
    const v = raw / 1000;
    label = (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2))) + 'k';
  } else {
    label = raw.toString();
  }
  const brl = (raw / 1000000 * KK_TO_BRL).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  return { label, brl };
}

const items = [];
const seen = new Set();
RAW.forEach(([name, source, price]) => {
  const key = name + '|' + source;
  if (!seen.has(key)) { seen.add(key); items.push({ name, source, price: price || 0 }); }
});

document.getElementById('total-count').textContent = items.length + ' itens no índice';

const cart = {};

function getTag(item) {
  const n = item.name.toLowerCase(), s = item.source.toLowerCase();
  if (s.startsWith('shiny')) return 'shiny';
  if (n.includes('orb')) return 'orb';
  if (n.includes('essence')) return 'essence';
  return 'normal';
}

function tagLabel(t) {
  return { shiny:'Shiny', orb:'Orb', essence:'Essência', normal:'Normal' }[t];
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter').value;
  const grid = document.getElementById('grid');

  const visible = items.filter((item) => {
    const tag = getTag(item);
    const matchQ = !q || item.name.toLowerCase().includes(q) || item.source.toLowerCase().includes(q);
    const matchF = f === 'all' || tag === f;
    return matchQ && matchF;
  });

  document.getElementById('count-label').textContent = visible.length + ' itens';

  if (!visible.length) {
    grid.innerHTML = '<div class="no-results">Nenhum item encontrado.</div>';
    return;
  }

  grid.innerHTML = visible.map((item, vi) => {
    const i = items.indexOf(item);
    const tag = getTag(item);
    const inCart = cart[i] > 0;
    const src = '';
    const priceData = formatKK(item.price);
    const priceHtml = priceData
      ? `<div class="price-block">
          <div class="price-row">
            <span class="price-label">Unit.</span>
            <span class="price-kk">${priceData.label}</span>
            <span class="price-brl">${priceData.brl}</span>
          </div>
          <div class="price-row" id="total-row-${i}">
            <span class="price-label">Total</span>
            <span class="price-total-kk" id="total-kk-${i}">${priceData.label}</span>
            <span class="price-total-brl" id="total-brl-${i}">${priceData.brl}</span>
          </div>
        </div>`
      : `<div class="item-price"><span class="price-none">sem preço</span></div>`;
    return `<div class="card${tag === 'shiny' ? ' is-shiny' : ''}">
      <div class="item-name">${item.name}</div>
      ${src}
      ${priceHtml}
      <div class="card-footer">
        <input type="number" id="qty-${i}" value="1" min="1" max="100000" oninput="updateTotalPrice(${i}, this.value)" />
        <button class="add-btn${inCart ? ' added' : ''}" id="addbtn-${i}" onclick="addToCart(${i})">
          ${inCart ? '✓ Adicionado' : 'Adicionar'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function updateTotalPrice(i, rawVal) {
  const qty = Math.max(1, parseInt(rawVal, 10) || 1);
  const item = items[i];
  if (!item || !item.price) return;
  const totalPrice = item.price * qty;
  const data = formatKK(totalPrice);
  if (!data) return;
  const kkEl = document.getElementById('total-kk-' + i);
  const brlEl = document.getElementById('total-brl-' + i);
  if (kkEl) kkEl.textContent = data.label;
  if (brlEl) brlEl.textContent = data.brl;
}


function sendToWhatsApp() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (!keys.length) return;

  const lines = keys.map(k => {
    const item = items[k];
    const qty = cart[k];
    const priceData = item.price ? formatKK(item.price * qty) : null;
    const priceStr = priceData ? ` — ${priceData.label} (${priceData.brl})` : '';
    return `• ${item.name} x${qty.toLocaleString()}${priceStr}`;
  });

  const grandTotalRaw = keys.reduce((s, k) => {
    const item = items[k];
    return s + (item && item.price ? item.price * cart[k] : 0);
  }, 0);

  let msg = '🛒 *Lista de Itens*\n\n' + lines.join('\n');
  if (grandTotalRaw > 0) {
    const gt = formatKK(grandTotalRaw);
    msg += `\n\n💰 *Total: ${gt.label} (${gt.brl})*`;
  }

  const phone = '5565999911832';
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function addToCart(i) {
  const input = document.getElementById('qty-' + i);
  let val = parseInt(input ? input.value : 1, 10);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 100000) val = 100000;
  cart[i] = (cart[i] || 0) + val;
  updateCartBadge();
  const btn = document.getElementById('addbtn-' + i);
  if (btn) { btn.textContent = '✓ Adicionado'; btn.classList.add('added'); }
}

function updateCartBadge() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const total = keys.reduce((s, k) => s + cart[k], 0);
  document.getElementById('cart-count-badge').textContent = total.toLocaleString();
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const footer = document.getElementById('cart-footer');
  const keys = Object.keys(cart).filter(k => cart[k] > 0);

  if (!keys.length) {
    list.innerHTML = `<div class="cart-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span>Carrinho vazio</span>
    </div>`;
    footer.style.display = 'none';
    return;
  }

  const total = keys.reduce((s, k) => s + cart[k], 0);
  const grandTotalRaw = keys.reduce((s, k) => {
    const item = items[k];
    return s + (item && item.price ? item.price * cart[k] : 0);
  }, 0);
  document.getElementById('cart-total-num').textContent = total.toLocaleString();
  footer.style.display = 'block';

  // Update grand total in footer
  const gtKkEl = document.getElementById('cart-grand-kk');
  const gtBrlEl = document.getElementById('cart-grand-brl');
  if (grandTotalRaw > 0) {
    const gtData = formatKK(grandTotalRaw);
    if (gtKkEl) gtKkEl.textContent = gtData.label;
    if (gtBrlEl) gtBrlEl.textContent = gtData.brl;
    document.getElementById('cart-grand-total-block').style.display = 'block';
  } else {
    document.getElementById('cart-grand-total-block').style.display = 'none';
  }

  list.innerHTML = keys.map(k => {
    const item = items[k];
    const src = '';
    const itemTotalRaw = item.price ? item.price * cart[k] : 0;
    const priceBlock = itemTotalRaw > 0
      ? (() => {
          const unitData = formatKK(item.price);
          const totalData = formatKK(itemTotalRaw);
          return `<div class="cart-price-block">
            <span class="cart-price-kk">${totalData.label}</span>
            <span class="cart-price-brl">${totalData.brl}</span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">unit: ${unitData.label}</span>
          </div>`;
        })()
      : '';
    return `<div class="cart-row">
      <div>
        <div class="cart-row-name">${item.name}</div>
        ${src}
      </div>
      <div class="cart-row-right">
        ${priceBlock}
        <span class="cart-qty">×${cart[k].toLocaleString()}</span>
        <button class="rem-btn" onclick="removeFromCart(${k})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function removeFromCart(i) {
  delete cart[i];
  const btn = document.getElementById('addbtn-' + i);
  if (btn) { btn.textContent = 'Adicionar'; btn.classList.remove('added'); }
  updateCartBadge();
  renderCart();
}

function clearCart() {
  Object.keys(cart).forEach(k => {
    const btn = document.getElementById('addbtn-' + k);
    if (btn) { btn.textContent = 'Adicionar'; btn.classList.remove('added'); }
    delete cart[k];
  });
  updateCartBadge();
  renderCart();
}

render();
